[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth"
  status = 200
  force = true

[[redirects]]
  from = "/api/cars"
  to = "/.netlify/functions/cars"
  status = 200
  force = true

[[redirects]]
  from = "/api/cars/*"
  to = "/.netlify/functions/cars"
  status = 200
  force = true

[[redirects]]
  from = "/api/car-images"
  to = "/.netlify/functions/car-images"
  status = 200
  force = true

[[redirects]]
  from = "/api/car-images/*"
  to = "/.netlify/functions/car-images"
  status = 200
  force = true

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200
  force = true

[[redirects]]
  from = "/api/hash"
  to = "/.netlify/functions/hash"
  status = 200
  force = true
  
[[redirects]]
  from = "/api/pending-cars"
  to = "/.netlify/functions/pending-cars"
  status = 200
  force = true

[[redirects]]
  from = "/api/pending-cars/*"
  to = "/.netlify/functions/pending-cars/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200